name: Deploy CONVERGENCE-Ai

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_CONVERGENCE_AI }}'
          projectId: convergence-ai
          channelId: live

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and Push Server Image
        run: |
          docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/convergence-repo/orchestrator-server:latest ./server
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/convergence-repo/orchestrator-server:latest

      - name: Deploy to Google Cloud Run
        run: |
          gcloud run deploy convergence-orchestrator \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/convergence-repo/orchestrator-server:latest \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --update-env-vars JWT_SECRET=${{ secrets.JWT_SECRET }},SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }},ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }},DEFAULT_VAULT_KEY=${{ secrets.DEFAULT_VAULT_KEY }}
